<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMCG Strategic Insights | Analytics Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-dark: #1a252f;
            --accent-blue: #3498db;
            --bg-light: #f4f7f6;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
            color: #333;
            overflow-x: hidden;
        }

        /* Professional Sidebar */
        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #1a252f 0%, #2c3e50 100%);
            color: white;
            padding-top: 30px;
            position: fixed;
            width: var(--sidebar-width);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .sidebar h4 {
            font-weight: 800;
            letter-spacing: 1.5px;
            font-size: 1.1rem;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        .sidebar a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 14px 25px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-left: 4px solid var(--accent-blue);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
            transition: all 0.3s;
        }

        /* Header Card */
        .header-card {
            background: white;
            padding: 25px 35px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        /* KPI Stats Cards */
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border-bottom: 4px solid var(--accent-blue);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            height: 100%;
        }

        .kpi-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #95a5a6;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .kpi-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        /* Dashboard Container */
        .dashboard-wrapper {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            min-height: 800px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-custom {
            background-color: var(--accent-blue);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #2980b9;
            color: white;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>

<body>

    <div class="sidebar d-flex flex-column">
        <h4 class="text-center mb-5"><i class="bi bi-shield-check me-2"></i>SKILL WALLET</h4>
        <a onclick="showSection('dashboard')" id="nav-dashboard" class="active">
            <i class="bi bi-grid-1x2-fill me-3"></i>Analytics Dashboard
        </a>
        <a onclick="showSection('story')" id="nav-story">
            <i class="bi bi-journal-text me-3"></i>Data Insights Story
        </a>
    </div>

    <div class="main-content">

        <div class="header-card d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1" id="main-title">Strategic Product Placement Analysis</h2>
                <p class="text-muted mb-0"><i class="bi bi-cpu me-2"></i>AI-Powered Demand Forecasting & FMCG
                    Optimization</p>
            </div>
            <button class="btn btn-custom shadow-sm">
                <i class="bi bi-cloud-arrow-down-fill me-2"></i>Export Analysis
            </button>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="kpi-card">
                    <div class="kpi-label">Dataset Size</div>
                    <div class="kpi-value">1,000+ Observations</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="kpi-card" style="border-bottom-color: #2ecc71;">
                    <div class="kpi-label">Primary Segments</div>
                    <div class="kpi-value">Food, Electronics, Clothing</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="kpi-card" style="border-bottom-color: #e67e22;">
                    <div class="kpi-label">Project Status</div>
                    <div class="kpi-value">Final Submission Ready</div>
                </div>
            </div>
        </div>

        <div class="dashboard-wrapper">
            <div id="dashboard" class="view-section active">
                <iframe
                    src="https://public.tableau.com/views/Book1_17727363493970/Dashboard1?:showVizHome=no&:embed=true"
                    width="100%" height="800px" style="border: none; border-radius: 10px;">
                </iframe>
            </div>

            <div id="story" class="view-section">
                <iframe src="https://public.tableau.com/views/Book1_17727363493970/Story1?:showVizHome=no&:embed=true"
                    width="100%" height="850px" style="border: none; border-radius: 10px;">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');

            document.querySelectorAll('.sidebar a').forEach(link => {
                link.classList.remove('active');
            });
            document.getElementById('nav-' + sectionId).classList.add('active');

            const title = document.getElementById('main-title');
            if (sectionId === 'dashboard') {
                title.innerText = 'Strategic Product Placement Analysis';
            } else {
                title.innerText = 'FMCG Strategic Data Story';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
